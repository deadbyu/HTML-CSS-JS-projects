<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="c8.css"></Link>
    <link href="https://googleapis.com" rel="stylesheet">

    <title>Counter</title>

</head>
<body>
    <div class="container">
        <h2>Real Time letter counter</h2>
        <textarea class="textarea" id="textarea" placeholder="Write your text here" maxlength="50"></textarea>
        <div class="counter_container"><P >Total: <span class="total_count" id="total_count">50</span></P>
        <p >Remaining: <span class="left_counter" id="left_counter">0</span></p></div>
    </div>
    <script src="j8.js"></script>
</body>
</html>
